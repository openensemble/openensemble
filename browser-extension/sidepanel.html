<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>OE Bridge — Chat</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px; color: #222; background: #f8f9fa;
      display: flex; flex-direction: column;
      box-sizing: border-box;
    }
    header {
      padding: 8px 12px; background: #fff; border-bottom: 1px solid #e2e4e8;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    h1 { display: flex; align-items: center; gap: 7px; font-size: 13px; margin: 0; font-weight: 600; }
    h1 img { width: 20px; height: 20px; }
    #status { font-size: 10px; padding: 2px 8px; border-radius: 999px; }
    #status.ok   { background: #d4f4dd; color: #1a6c2f; }
    #status.bad  { background: #fbe2e2; color: #8a2424; }
    #status.idle { background: #e4e7ec; color: #555; }

    #messages {
      flex: 1; overflow-y: auto;
      padding: 8px 12px; display: flex; flex-direction: column; gap: 8px;
    }
    .msg { padding: 8px 12px; border-radius: 8px; max-width: 100%; word-wrap: break-word; white-space: pre-wrap; line-height: 1.45; }
    .msg.user { background: #2563eb; color: #fff; align-self: flex-end; }
    .msg.assistant { background: #fff; border: 1px solid #e2e4e8; color: #1d1f23; }
    .msg.assistant .tool-line { color: #6b7280; font-size: 11px; font-style: italic; padding: 2px 0; }
    .ts { font-size: 10px; color: #9aa0a6; margin-top: 4px; }

    footer {
      padding: 8px 12px 12px; background: #fff; border-top: 1px solid #e2e4e8;
      flex-shrink: 0;
    }
    .quick-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .quick-row button {
      flex: 1; padding: 6px 8px; border: 1px solid #c0c4cc; background: #f8f9fa; border-radius: 4px;
      cursor: pointer; font-size: 11px; font-weight: 600; color: #2563eb;
    }
    textarea {
      width: 100%; box-sizing: border-box; padding: 8px 10px;
      border: 1px solid #c0c4cc; border-radius: 6px;
      font-family: inherit; font-size: 12px; resize: vertical;
      min-height: 60px;
    }
    .send-row { display: flex; gap: 6px; margin-top: 8px; }
    .send-row button {
      padding: 8px 12px; border: 1px solid #c0c4cc; background: #fff; border-radius: 4px;
      cursor: pointer; font-weight: 600; font-size: 12px;
    }
    .send-row button.primary { background: #2563eb; color: #fff; border-color: #2563eb; flex: 1; }
    .empty { color: #9aa0a6; text-align: center; padding: 20px; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1><img src="icons/oe-bridge-32.png" alt="">OE Chat</h1>
    <span id="status" class="status idle">…</span>
  </header>

  <div id="messages">
    <div id="empty" class="empty">No conversation yet. Ask Sydney something.</div>
  </div>

  <footer>
    <div class="quick-row">
      <button id="askThisPage" title="Take a screenshot of the current tab and ask Sydney to describe it.">📷 Ask about this page</button>
      <button id="teachThisSite" title="Start a teach session: Sydney watches your clicks and writes site notes.">🎓 Teach this site</button>
    </div>
    <textarea id="chatInput" placeholder="Ask Sydney…  (Enter = send, Shift+Enter = newline)" rows="3"></textarea>
    <div class="send-row">
      <button id="chatSend" class="primary">Send</button>
      <button id="chatClear">Clear</button>
    </div>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
